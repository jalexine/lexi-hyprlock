    font_color = rgba(e93f77ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##e93f77">ACCESS KEY</span>
    hide_input = false
    check_color = rgba(e93f77ff)
    fail_color = rgba(e93f77ff)
    fail_text = <span foreground="##e93f77">ACCESS DENIED</span>
    capslock_color = rgba(e93f77ff)
